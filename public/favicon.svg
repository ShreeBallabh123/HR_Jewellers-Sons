<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCFAFF" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#C5A028" />
      <stop offset="100%" stop-color="#AA820A" />
    </linearGradient>
  </defs>
  
  <!-- Outer luxury shield ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="2,2" />
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
  <circle cx="50" cy="50" r="36" fill="none" stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.6" />
  
  <!-- Symmetric royal crest floral embellishments -->
  <path d="M50,16 L53,23 L50,21 L47,23 Z" fill="url(#goldGrad)" />
  <circle cx="50" cy="13" r="1.5" fill="url(#goldGrad)" />
  
  <!-- Elegant Serif Monogram initials H and R intertwined -->
  <!-- Letter H -->
  <path d="M37,34 L37,66 M37,50 L47,50 M47,34 L47,66" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none" />
  <!-- Serif feet for H -->
  <path d="M33,34 L41,34 M33,66 L41,66 M43,34 L51,34" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  
  <!-- Letter R (intertwined elegantly) -->
  <path d="M47,34 L57,34 C63,34 65,38 65,43 C65,48 61,50 55,50 L47,50 M55,50 L63,66" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Serif feet for R -->
  <path d="M51,66 L67,66" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  
  <!-- Bottom royal star -->
  <path d="M50,77 L52,80 L55,80 L53,82 L54,85 L50,83 L46,85 L47,82 L45,80 L48,80 Z" fill="url(#goldGrad)" />
</svg>